openapi: 3.0.3
info:
  title: WebHook Tester
  description: The powerful tool to test webhooks and not only
  version: 0.3.0
  contact: {name: tarampampam, url: 'https://github.com/tarampampam'}

servers:
  - {url: '/', description: Current server}

tags:
  - name: api
  - name: service

paths:
  /api/settings:
    get:
      summary: Get app settings
      tags: [api]
      operationId: apiSettings
      responses:
        '200': {$ref: '#/components/responses/SettingsResponse'}

  /api/sessions:
    get:
      summary: List all sessions
      tags: [api]
      operationId: apiSessionsList
      parameters:
        - name: group
          in: query
          required: false
          schema: {type: string, description: Filter by group name (exact match)}
        - name: q
          in: query
          required: false
          schema: {type: string, description: Case-sensitive substring filter applied to id, slug and group name}
      responses:
        '200': {$ref: '#/components/responses/SessionsListResponse'}
        '5XX': {$ref: '#/components/responses/ErrorResponse'} # Server error

  /api/search:
    get:
      summary: Search across captured request identifiers
      tags: [api]
      operationId: apiSearch
      parameters:
        - name: value
          in: query
          required: true
          schema: {type: string, minLength: 1, description: Identifier value to match}
        - name: key
          in: query
          required: false
          schema: {type: string, description: Identifier key to match (empty matches any key)}
        - name: match
          in: query
          required: false
          schema: {type: string, enum: [exact, prefix], description: 'Value match mode (default: exact)'}
        - name: group
          in: query
          required: false
          schema: {type: string, description: Restrict to sessions in this group}
        - name: session
          in: query
          required: false
          schema: {type: string, description: Restrict to a single session (uuid or slug)}
        - name: from
          in: query
          required: false
          schema: {type: integer, x-go-type: int64, description: Lower bound on capture time (unix milliseconds)}
        - name: to
          in: query
          required: false
          schema: {type: integer, x-go-type: int64, description: Upper bound on capture time (unix milliseconds)}
        - name: limit
          in: query
          required: false
          schema: {type: integer, x-go-type: int, description: Maximum number of results to return}
      responses:
        '200': {$ref: '#/components/responses/SearchResponse'}
        '400': {$ref: '#/components/responses/ErrorResponse'} # Bad request
        '5XX': {$ref: '#/components/responses/ErrorResponse'} # Server error

  /api/session:
    post:
      summary: Create a new session
      tags: [api]
      operationId: apiSessionCreate
      requestBody: {$ref: '#/components/requestBodies/CreateSessionRequest'}
      responses:
        '200': {$ref: '#/components/responses/SessionOptionsResponse'}
        '400': {$ref: '#/components/responses/ErrorResponse'} # Bad request
        '5XX': {$ref: '#/components/responses/ErrorResponse'} # Server error

  /api/session/check/exists:
    post:
      summary: Batch check if sessions exist by UUID
      tags: [api]
      operationId: apiSessionCheckExists
      requestBody: {$ref: '#/components/requestBodies/CheckSessionExistsRequest'}
      responses:
        '200': {$ref: '#/components/responses/CheckSessionExistsResponse'}
        '5XX': {$ref: '#/components/responses/ErrorResponse'} # Server error

  /api/session/{session_uuid}:
    get:
      summary: Get session options by UUID
      tags: [api]
      operationId: apiSessionGet
      parameters: [{$ref: '#/components/parameters/SessionUUIDInPath'}]
      responses:
        '200': {$ref: '#/components/responses/SessionOptionsResponse'}
        '404': {$ref: '#/components/responses/ErrorResponse'} # Not found
        '5XX': {$ref: '#/components/responses/ErrorResponse'} # Server error

    patch:
      summary: Update session options (by UUID or slug)
      tags: [api]
      operationId: apiSessionUpdate
      parameters: [{$ref: '#/components/parameters/SessionUUIDInPath'}]
      requestBody: {$ref: '#/components/requestBodies/UpdateSessionRequest'}
      responses:
        '200': {$ref: '#/components/responses/SessionOptionsResponse'}
        '400': {$ref: '#/components/responses/ErrorResponse'} # Bad request
        '404': {$ref: '#/components/responses/ErrorResponse'} # Not found
        '5XX': {$ref: '#/components/responses/ErrorResponse'} # Server error

    delete:
      summary: Delete a session by UUID
      tags: [api]
      operationId: apiSessionDelete
      parameters: [{$ref: '#/components/parameters/SessionUUIDInPath'}]
      responses:
        '200': {$ref: '#/components/responses/SuccessfulOperationResponse'}
        '404': {$ref: '#/components/responses/ErrorResponse'} # Not found
        '5XX': {$ref: '#/components/responses/ErrorResponse'} # Server error

  /api/session/{session_uuid}/requests:
    get: # TODO: add possibility to omit the request body
      summary: Get the list of requests for a session by UUID
      tags: [api]
      operationId: apiSessionListRequests
      parameters: [{$ref: '#/components/parameters/SessionUUIDInPath'}]
      responses:
        '200': {$ref: '#/components/responses/CapturedRequestsListResponse'}
        '404': {$ref: '#/components/responses/ErrorResponse'} # Not found
        '5XX': {$ref: '#/components/responses/ErrorResponse'} # Server error

    delete:
      summary: Delete all requests for a session by UUID
      tags: [api]
      operationId: apiSessionDeleteAllRequests
      parameters: [{$ref: '#/components/parameters/SessionUUIDInPath'}]
      responses:
        '200': {$ref: '#/components/responses/SuccessfulOperationResponse'}
        '404': {$ref: '#/components/responses/ErrorResponse'} # Not found
        '5XX': {$ref: '#/components/responses/ErrorResponse'} # Server error

  /api/session/{session_uuid}/requests/subscribe:
    get:
      summary: Subscribe to new requests for a session by UUID using WebSocket
      tags: [api]
      operationId: apiSessionRequestsSubscribe
      parameters:
        - {$ref: '#/components/parameters/SessionUUIDInPath'}
        - {$ref: '#/components/parameters/WebSocketRequestConnectionInHeader'}
        - {$ref: '#/components/parameters/WebSocketRequestUpgradeInHeader'}
        - {$ref: '#/components/parameters/WebSocketRequestSecKeyInHeader'}
        - {$ref: '#/components/parameters/WebSocketRequestSecVersionInHeader'}
      responses:
        '101':
          description: Switching Protocols
          headers:
            Connection: {$ref: '#/components/headers/WebSocketResponseConnection'}
            Upgrade: {$ref: '#/components/headers/WebSocketResponseUpgrade'}
            Sec-Websocket-Accept: {$ref: '#/components/headers/WebSocketResponseSecWebsocketAccept'}
        '200':
          description: WebSocket connection established
          content:
            application/json:
              schema: {$ref: '#/components/schemas/RequestEvent'}
        '400': {$ref: '#/components/responses/ErrorResponse'} # Bad request
        '5XX': {$ref: '#/components/responses/ErrorResponse'} # Server error

  /api/session/{session_uuid}/requests/{request_uuid}:
    get:
      summary: Get captured request details by UUID for a session by UUID
      tags: [api]
      operationId: apiSessionGetRequest
      parameters:
        - {$ref: '#/components/parameters/SessionUUIDInPath'}
        - {$ref: '#/components/parameters/RequestUUIDInPath'}
      responses:
        '200': {$ref: '#/components/responses/CapturedRequestsResponse'}
        '404': {$ref: '#/components/responses/ErrorResponse'} # Not found
        '5XX': {$ref: '#/components/responses/ErrorResponse'} # Server error

    delete:
      summary: Delete a request by UUID for a session by UUID
      tags: [api]
      operationId: apiSessionDeleteRequest
      parameters:
        - {$ref: '#/components/parameters/SessionUUIDInPath'}
        - {$ref: '#/components/parameters/RequestUUIDInPath'}
      responses:
        '200': {$ref: '#/components/responses/SuccessfulOperationResponse'}
        '404': {$ref: '#/components/responses/ErrorResponse'} # Not found
        '5XX': {$ref: '#/components/responses/ErrorResponse'} # Server error

  /api/session/{session_uuid}/requests/{request_uuid}/replay:
    post:
      summary: Replay a captured request to a target URL
      tags: [api]
      operationId: apiSessionReplayRequest
      parameters:
        - {$ref: '#/components/parameters/SessionUUIDInPath'}
        - {$ref: '#/components/parameters/RequestUUIDInPath'}
      requestBody: {$ref: '#/components/requestBodies/ReplayRequest'}
      responses:
        '200': {$ref: '#/components/responses/ReplayResponse'}
        '400': {$ref: '#/components/responses/ErrorResponse'} # Bad request
        '404': {$ref: '#/components/responses/ErrorResponse'} # Not found
        '5XX': {$ref: '#/components/responses/ErrorResponse'} # Server error

  /api/version:
    get:
      summary: Get app version
      tags: [api]
      operationId: apiAppVersion
      responses:
        '200': {$ref: '#/components/responses/VersionResponse'}

  /api/version/latest:
    get:
      summary: Get the latest app version
      tags: [api]
      operationId: apiAppVersionLatest
      responses:
        '200': {$ref: '#/components/responses/VersionResponse'}
        '5XX': {$ref: '#/components/responses/ErrorResponse'} # Server error

  /ready:
    get:
      summary: Readiness probe (checks if the app is ready to serve traffic)
      tags: [service]
      operationId: readinessProbe
      responses:
        '200': {$ref: '#/components/responses/ServiceHealthy'}
        '503': {$ref: '#/components/responses/ServiceUnhealthy'}

    head:
      summary: Readiness probe (HEAD)
      description: Alias for the GET method, but without response body content
      tags: [service]
      operationId: readinessProbeHead
      responses:
        '200': {$ref: '#/components/responses/ServiceHealthy'}
        '503': {$ref: '#/components/responses/ServiceUnhealthy'}

  /healthz:
    get:
      summary: Liveness probe (checks if the app is running or down)
      tags: [service]
      operationId: livenessProbe
      responses:
        '200': {$ref: '#/components/responses/ServiceHealthy'}
        '503': {$ref: '#/components/responses/ServiceUnhealthy'}

    head:
      summary: Liveness probe (HEAD)
      description: Alias for the GET method, but without response body content
      tags: [service]
      operationId: livenessProbeHead
      responses:
        '200': {$ref: '#/components/responses/ServiceHealthy'}
        '503': {$ref: '#/components/responses/ServiceUnhealthy'}

components:
  schemas: # ------------------------------------------------ SCHEMAS -------------------------------------------------
    StatusCode:
      description: HTTP status code
      type: integer
      example: 301
      minimum: 200
      maximum: 530

    Base64Encoded:
      description: Base64-encoded content
      type: string
      maxLength: 10240
      example: aGVsbG8gd29ybGQ=

    UnixMilliTime:
      description: Unix timestamp in milliseconds (the number of milliseconds elapsed since January 1, 1970 UTC)
      type: integer
      example: 1667845578
      minimum: 1600000000
      x-go-type: int64

    UUID:
      type: string
      format: uuid
      pattern: '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}'
      example: 9b6bbab9-c197-4dd3-bc3f-3cb6253820c7

    HttpMethod:
      description: HTTP method (GET, POST, PUT, DELETE, etc.)
      type: string
      minLength: 1
      example: GET

    HttpHeader:
      type: object
      properties:
        name: {type: string, minLength: 1, maxLength: 40, example: User-Agent}
        value: {type: string, minLength: 0, maxLength: 2048, example: curl/7.68.0}
      required: [name, value]
      additionalProperties: false

    SessionResponseOptions:
      description: Session response options
      type: object
      properties:
        status_code: {$ref: '#/components/schemas/StatusCode'}
        headers: {type: array, items: {$ref: '#/components/schemas/HttpHeader'}}
        delay: {type: integer, description: Delay in seconds, maximum: 30, example: 5, x-go-type: uint16}
        response_body_base64: {$ref: '#/components/schemas/Base64Encoded'}
        slug: {type: string, minLength: 1, maxLength: 49, example: my-session, description: Human-readable session slug}
        group: {type: string, minLength: 1, maxLength: 100, example: team-a, description: Group name for organising sessions}
        response_script: {type: string, maxLength: 20000, example: '', description: Go text/template script for dynamic responses}
        security_headers:
          type: array
          items: {$ref: '#/components/schemas/HttpHeader'}
          description: Additional security headers to add to every captured-request response
        forward_url: {type: string, example: 'https://example.com/webhook', description: Forward incoming requests to this URL}
        long_lived: {type: boolean, example: false, description: If true the session does not expire on the normal TTL}
      required: [status_code, headers, delay, response_body_base64]
      additionalProperties: false

    SessionSummary:
      description: Summary information about a session
      type: object
      properties:
        uuid: {$ref: '#/components/schemas/UUID'}
        slug: {type: string, example: my-session}
        group: {type: string, example: team-a}
        status_code: {$ref: '#/components/schemas/StatusCode'}
        requests_count: {type: integer, x-go-type: uint32, example: 42}
        last_request_unix_milli: {$ref: '#/components/schemas/UnixMilliTime'}
        created_at_unix_milli: {$ref: '#/components/schemas/UnixMilliTime'}
        expires_at_unix_milli: {$ref: '#/components/schemas/UnixMilliTime'}
        long_lived: {type: boolean, example: false}
      required: [uuid, slug, status_code, requests_count, created_at_unix_milli, expires_at_unix_milli, long_lived]
      additionalProperties: false

    SearchResultItem:
      description: A single search result linking a matched identifier to its captured request
      type: object
      properties:
        session_slug: {type: string, example: my-session}
        request_uuid: {$ref: '#/components/schemas/UUID'}
        key: {type: string, example: txn_id, description: The identifier key that matched the query}
        value: {type: string, example: abc-123, description: The identifier value that matched the query}
        captured_at_unix_milli: {$ref: '#/components/schemas/UnixMilliTime'}
      required: [session_slug, request_uuid, key, value, captured_at_unix_milli]
      additionalProperties: false

    UpdateSessionRequest:
      description: Fields to update on a session (all optional; omitted fields are left unchanged)
      type: object
      properties:
        status_code: {$ref: '#/components/schemas/StatusCode'}
        headers: {type: array, items: {$ref: '#/components/schemas/HttpHeader'}}
        delay: {type: integer, description: Delay in seconds, maximum: 30, example: 5, x-go-type: uint16}
        response_body_base64: {$ref: '#/components/schemas/Base64Encoded'}
        slug: {type: string, minLength: 1, maxLength: 49, example: my-session}
        group: {type: string, minLength: 1, maxLength: 100, example: team-a}
        response_script: {type: string, maxLength: 20000, example: ''}
        security_headers: {type: array, items: {$ref: '#/components/schemas/HttpHeader'}}
        forward_url: {type: string, example: 'https://example.com/webhook'}
        long_lived: {type: boolean, example: false}
      additionalProperties: false

    ReplayRequest:
      description: Options for replaying a captured request to a target URL
      type: object
      properties:
        target_url:
          type: string
          description: URL to replay the captured request to
          example: 'https://example.com/webhook'
      required: [target_url]
      additionalProperties: false

    ReplayResponse:
      description: Response received when replaying a captured request
      type: object
      properties:
        status_code: {$ref: '#/components/schemas/StatusCode'}
        headers: {type: array, items: {$ref: '#/components/schemas/HttpHeader'}}
        body_base64: {$ref: '#/components/schemas/Base64Encoded'}
      required: [status_code, headers, body_base64]
      additionalProperties: false

    AppSettings:
      description: Configuration settings of the app
      type: object
      properties:
        limits:
          type: object
          description: App limit settings
          properties:
            max_requests: {type: integer, x-go-type: uint16, example: 128}
            max_request_body_size: {type: integer, x-go-type: uint32, example: 1024, description: In bytes}
            session_ttl: {type: integer, x-go-type: uint32, example: 5, description: In seconds}
          required: [max_requests, max_request_body_size, session_ttl]
          additionalProperties: false
        tunnel:
          type: object
          description: Tunnel settings
          properties:
            enabled: {type: boolean, example: true}
            url: {type: string, example: 'https://tunnel.example.com/'} # optional
          required: [enabled]
          additionalProperties: false
        public_url_root: {type: string, example: 'https://example.com', description: 'Public URL root override for webhook URLs'} # optional
      required: [limits, tunnel]
      additionalProperties: false

    CapturedRequest:
      type: object
      description: Recorded request
      properties:
        uuid: {$ref: '#/components/schemas/UUID'}
        client_address: {type: string, format: IPv4, example: '214.184.32.7'}
        method: {$ref: '#/components/schemas/HttpMethod'}
        request_payload_base64: {$ref: '#/components/schemas/Base64Encoded'}
        headers: {type: array, items: {$ref: '#/components/schemas/HttpHeader'}}
        url:
          description: The URL's hostname, schema, and port may differ from those on the frontend due to proxying
          type: string
          example: 'https://example.com/path?query=string'
        captured_at_unix_milli: {$ref: '#/components/schemas/UnixMilliTime'}
      required: [uuid, client_address, method, request_payload_base64, headers, url, captured_at_unix_milli]
      additionalProperties: false

    RequestEvent:
      type: object
      properties:
        action:
          type: string
          enum: [create, delete, clear]
          example: create
        request: {$ref: '#/components/schemas/RequestEventRequest'}
      required: [action]
      additionalProperties: false

    RequestEventRequest:
      type: object
      properties:
        uuid: {$ref: '#/components/schemas/UUID'}
        client_address: {type: string, example: '214.184.32.7', description: 'May be IPv6 like 2a0e:4005:1002:ffff:185:40:4:132'}
        method: {$ref: '#/components/schemas/HttpMethod'}
        headers: {type: array, items: {$ref: '#/components/schemas/HttpHeader'}}
        url: {type: string, example: 'https://example.com/path?query=string'}
        captured_at_unix_milli: {$ref: '#/components/schemas/UnixMilliTime'}
      required: [uuid, client_address, method, headers, url, captured_at_unix_milli]
      additionalProperties: false

  headers: # ------------------------------------------------ HEADERS -------------------------------------------------
    WebSocketResponseConnection:
      description: WebSocket connection header
      schema: {type: string, example: Upgrade, externalDocs: {url: 'https://mzl.la/3WWJi8w'}}

    WebSocketResponseUpgrade:
      description: WebSocket upgrade header
      schema: {type: string, example: websocket, externalDocs: {url: 'https://mzl.la/46XxkyZ'}}

    WebSocketResponseSecWebsocketAccept:
      description: WebSocket Sec-WebSocket-Accept header
      schema: {type: string, example: 'nESCeAuSsDkp9fVKF/BQ9Nfev+U=', externalDocs: {url: 'https://mzl.la/4duaxwC'}}

  parameters: # --------------------------------------------- PARAMETERS ----------------------------------------------
    SessionUUIDInPath:
      description: Session reference — UUID (version 4) or human-readable slug
      name: session_uuid
      in: path
      required: true
      schema:
        type: string
        pattern: '^[a-z0-9][a-z0-9-]{1,48}$|^[0-9a-fA-F-]{36}$'
        example: 9b6bbab9-c197-4dd3-bc3f-3cb6253820c7

    RequestUUIDInPath:
      description: Request UUID (version 4)
      name: request_uuid
      in: path
      required: true
      schema:
        type: string
        format: uuid
        pattern: '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}'
        example: d74a7998-dcbc-4d77-82ba-27945e56a25d

    WebSocketRequestConnectionInHeader:
      name: Connection
      in: header
      required: true
      schema: {type: string, example: Upgrade, externalDocs: {url: 'https://mzl.la/3WWJi8w'}}

    WebSocketRequestUpgradeInHeader:
      name: Upgrade
      in: header
      required: true
      schema: {type: string, example: websocket, externalDocs: {url: 'https://mzl.la/46XxkyZ'}}

    WebSocketRequestSecKeyInHeader:
      name: Sec-WebSocket-Key
      in: header
      required: true
      schema: {type: string, example: 'K/TxmSsnVc71pFVjGIYy3w=='}

    WebSocketRequestSecVersionInHeader:
      name: Sec-WebSocket-Version
      in: header
      required: true
      schema: {type: string, example: '13'}

  requestBodies: # --------------------------------------------- REQUESTS ---------------------------------------------
    CreateSessionRequest:
      description: Options for creating a new session
      content:
        application/json:
          schema: {$ref: '#/components/schemas/SessionResponseOptions'}

    UpdateSessionRequest:
      description: Fields to update on an existing session (all optional)
      content:
        application/json:
          schema: {$ref: '#/components/schemas/UpdateSessionRequest'}

    ReplayRequest:
      description: Options for replaying a captured request
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ReplayRequest'}

    CheckSessionExistsRequest:
      description: Check if a session exists by UUID
      content:
        application/json:
          schema:
            type: array
            items: {$ref: '#/components/schemas/UUID'}
            minItems: 1
            maxItems: 100

  responses: # ---------------------------------------------- RESPONSES -----------------------------------------------
    VersionResponse:
      description: Information about the version
      content:
        application/json:
          schema:
            type: object
            properties: {version: {type: string, example: '0.0.1'}}
            required: [version]
            additionalProperties: false

    SettingsResponse:
      description: Configuration settings of the app
      content:
        application/json:
          schema: {$ref: '#/components/schemas/AppSettings'}

    SessionOptionsResponse:
      description: Options of the session
      content:
        application/json:
          schema:
            type: object
            properties:
              uuid: {$ref: '#/components/schemas/UUID'}
              response: {$ref: '#/components/schemas/SessionResponseOptions'}
              created_at_unix_milli: {$ref: '#/components/schemas/UnixMilliTime'}
              expires_at_unix_milli: {$ref: '#/components/schemas/UnixMilliTime'}
            required: [uuid, response, created_at_unix_milli]
            additionalProperties: false

    SessionsListResponse:
      description: List of session summaries
      content:
        application/json:
          schema:
            type: array
            items: {$ref: '#/components/schemas/SessionSummary'}

    SearchResponse:
      description: Search results
      content:
        application/json:
          schema:
            type: array
            items: {$ref: '#/components/schemas/SearchResultItem'}

    ReplayResponse:
      description: Response received when replaying a captured request
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ReplayResponse'}

    CheckSessionExistsResponse:
      description: A hashmap of session UUIDs and their existence
      content:
        application/json:
          schema:
            type: object
            additionalProperties:
              type: boolean
              example: true
            example:
              9b6bbab9-c197-4dd3-bc3f-3cb6253820c7: true
              9b6bbab9-c197-4dd3-bc3f-3cb6253820c8: false

    CapturedRequestsListResponse:
      description: List of captured requests, sorted from newest to oldest
      content:
        application/json:
          schema: {type: array, items: {$ref: '#/components/schemas/CapturedRequest'}}

    CapturedRequestsResponse:
      description: Captured request
      content:
        application/json:
          schema: {$ref: '#/components/schemas/CapturedRequest'}

    SuccessfulOperationResponse:
      description: Operation completed successfully
      content:
        application/json:
          schema:
            type: object
            properties: {success: {type: boolean, example: true}}
            required: [success]
            additionalProperties: false

    ServiceHealthy:
      description: Service is operational
      content: {text/plain: {example: OK}}

    ServiceUnhealthy:
      description: Service unavailable
      content: {text/plain: {example: 'application error: some service is unavailable: host "10.0.0.10" unreachable'}}

    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            type: object
            properties: {error: {type: string, example: 'Internal server error'}}
            required: [error]
            additionalProperties: false
